name: Build and release

on:
  # label:
  #   types: created
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    permissions:
      id-token: write
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:

    - name: Set tag reference from input
      if: github.event.ref != ''
      run: |
        echo "GIT_REF=refs/tags/${{ github.event.ref}}" >> $GITHUB_ENV

    - name: Set tag reference from github.ref
      if: github.ref != ''
      run: | 
        echo "GIT_REF=${{ github.ref }}" >> $GITHUB_ENV
        

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ env.GIT_REF }}        

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"
      
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v6
      id: go-release
      with:
        distribution: goreleaser
        version: '~> v2'
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup KO
      uses: ko-build/setup-ko@v0.6

    - run: ko build --bare -t latest -t ${{ github.run_id }} -t ${{ fromJSON(steps.go-release.outputs.metadata).tag }} --image-label org.opencontainers.image.source=https://github.com/userbradley/immich-go
      env:
        KO_DOCKER_REPO: ghcr.io/userbradley/immich-go
